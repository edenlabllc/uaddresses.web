name: uaadresses-web CI

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm -v
    - run: npm install
    - run: sudo npm i -g standard-version
    - run: npm install karma --save-dev --legacy-peer-deps
    - run: npm install karma-jasmine karma-chrome-launcher jasmine-core --save-dev --legacy-peer-deps
    - run: npm install --legacy-peer-deps
    - run: npm run build --if-present
    # - run: npm run test
    - run: npm run lint || exit 1

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Authenticate to Google Cloud (OIDC)
      uses: google-github-actions/auth@v2
      id: auth
      with:
        token_format: access_token
        workload_identity_provider: "projects/783375390186/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
        service_account: "gha-cosign-artifact@ehealth-162117.iam.gserviceaccount.com"

    - name: Login to GAR
      uses: docker/login-action@v3
      with:
        registry: europe-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Set image tag
      id: vars
      run: |
        echo "image_tag=$(standard-version -m "chore(release): publish %s [ci skip]" --dry-run | grep 'release v' | awk -Frelease '{ print $2 }' | xargs)" >> $GITHUB_OUTPUT
        echo "project_name=$(cat "package.json" | grep name | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | xargs)" >> $GITHUB_OUTPUT
        echo "timestamp=$(date +'%s')" >> $GITHUB_OUTPUT

    - name: Build and push images
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        push: true
        context: .
        file: Dockerfile
        tags: europe-docker.pkg.dev/ehealth-162117/eu.gcr.io/${{ steps.vars.outputs.project_name }}:${{ steps.vars.outputs.image_tag }}

    - name: Release (only master)
      if: github.ref_name == 'master'
      run: |
        git config --global user.email "deployment@edenlab.com.ua"
        git config --global user.name "Deployment Bot"
        standard-version -m "chore(release): publish %s [ci skip]"
        git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/edenlabllc/uaddresses.web.git
        git push --follow-tags origin master
      continue-on-error: false

    - name: Scan image for vulnerabilities (Trivy)
      id: trivy
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: "europe-docker.pkg.dev/ehealth-162117/eu.gcr.io/${{ steps.vars.outputs.project_name }}@${{ steps.docker_build.outputs.digest }}"
        format: "table"
        output: "trivy-results.txt"
        severity: "HIGH,CRITICAL"
        ignore-unfixed: true
        exit-code: "0"
      env:
        TRIVY_USERNAME: oauth2accesstoken
        TRIVY_PASSWORD: ${{ steps.auth.outputs.access_token }}
        TRIVY_DISABLE_VEX_NOTICE: "true"
        TRIVY_TABLE_MODE: "detailed"

    - name: Add Trivy results to Job Summary
      if: always()
      run: |
        echo "## 🔍 Trivy Vulnerability Scan: ${{ steps.vars.outputs.project_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Image:** \`europe-docker.pkg.dev/ehealth-162117/eu.gcr.io/${{ steps.vars.outputs.project_name }}@${{ steps.docker_build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Tag:** \`${{ steps.vars.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Severity:** HIGH, CRITICAL | **Unfixed:** ignored" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -s trivy-results.txt ]; then
          echo "### ⚠️ Vulnerabilities Found (HIGH/CRITICAL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "### ✅ No HIGH/CRITICAL vulnerabilities found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign image with cosign using digest
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
      run: |
        echo "Signing digest: ${{ steps.docker_build.outputs.digest }}"
        cosign sign --tlog-upload=false \
          --yes \
          --key gcpkms://projects/ehealth-162117/locations/europe-west1/keyRings/ehealth/cryptoKeys/cosign-signer-key \
          europe-docker.pkg.dev/ehealth-162117/eu.gcr.io/${{ steps.vars.outputs.project_name }}@${{ steps.docker_build.outputs.digest }}
